<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金时出库单 (字段映射版)</title>
    <!-- 飞书多维表格 SDK (UMD) 确保文件在同一目录 -->
    <script src="lark-sdk.umd.js" defer></script>
    <style>
        /* 重置与打印优化 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '仿宋', 'SimSun', serif;
        }
        body {
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            padding: 10mm 12mm;
            background: #fff;
            font-size: 14px;
            line-height: 1.5;
            color: #000;
        }
        @media print {
            .no-print {
                display: none !important;
            }
            body {
                padding: 5mm 8mm;
            }
            @page {
                size: A4;
                margin: 10mm 12mm;
            }
            .field-value {
                border-bottom: 1px solid #000 !important;
            }
        }

        /* 屏幕调试区 */
        .debug-panel {
            background: #f0f7ff;
            border: 1px solid #007fff;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            font-family: monospace;
            max-height: 300px;
            overflow: auto;
        }
        .debug-panel h4 {
            margin-bottom: 8px;
            color: #0056b3;
        }
        .field-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 4px 8px;
        }
        .field-item {
            background: #fff;
            padding: 2px 6px;
            border-radius: 3px;
            border-left: 3px solid #007fff;
        }

        /* 按钮组 */
        .btn-group {
            position: fixed;
            top: 15px;
            right: 20px;
            z-index: 999;
            display: flex;
            gap: 8px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .btn-primary { background: #007fff; }
        .btn-primary:hover { background: #0066cc; }
        .btn-success { background: #2ecc71; }
        .btn-success:hover { background: #27ae60; }
        .error-tip {
            background: #ffebee;
            border-left: 4px solid #d32f2f;
            padding: 10px 15px;
            margin: 15px 0;
            color: #b71c1c;
        }

        /* 单据标题 */
        .invoice-title {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 4px;
            margin-bottom: 16px;
            border-bottom: 2px solid #333;
            padding-bottom: 8px;
        }

        /* 头部信息 - 5列网格 */
        .header-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px 15px;
            border: 1px solid #333;
            padding: 12px 15px;
            margin-bottom: 24px;
            background: #fefefe;
        }
        .header-item {
            display: flex;
            align-items: baseline;
        }
        .header-label {
            font-weight: 600;
            width: 75px;
            flex-shrink: 0;
            color: #2c3e50;
        }
        .header-label::after {
            content: "：";
        }
        .field-value {
            flex: 1;
            border-bottom: 1px dashed #666;
            min-height: 22px;
            padding: 0 4px;
            color: #0b1f33;
        }

        /* 明细表格 */
        .detail-section {
            margin: 24px 0 16px;
            border: 1px solid #333;
        }
        .detail-table {
            width: 100%;
            border-collapse: collapse;
        }
        .detail-table td {
            border: 1px solid #333;
            padding: 10px 8px;
            vertical-align: middle;
        }
        .label-cell {
            font-weight: 600;
            background-color: #f3f3f3;
            width: 15%;
            white-space: nowrap;
            text-align: center;
        }
        .value-cell {
            width: 35%;
            text-align: left;
            padding-left: 12px;
        }
        /* 备注行单独处理，但需求中没要求备注，可留空或隐藏 */
        .remark-row td {
            background: #f9f9f9;
        }
        .remark-label {
            font-weight: 600;
            background: #e9e9e9;
            text-align: center;
        }

        /* 底部信息 */
        .footer-info {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            border-top: 1px dashed #333;
            padding-top: 12px;
            font-size: 14px;
        }
        .signature {
            display: flex;
            gap: 50px;
        }
        .signature span {
            border-bottom: 1px solid #333;
            min-width: 100px;
            display: inline-block;
            text-align: center;
        }

        /* 占位符空值样式 */
        .empty-placeholder {
            color: #9aa6b2;
            font-style: italic;
        }
    </style>
</head>
<body>
    <!-- 操作按钮 -->
    <div class="btn-group no-print">
        <button class="btn btn-primary" onclick="loadSelectedData()">📋 加载单据</button>
        <button class="btn btn-success" onclick="printDocument()">🖨️ 打印</button>
    </div>

    <!-- 调试面板 -->
    <div class="debug-panel no-print" id="debugPanel">
        <h4>🔍 字段调试 (选中记录后自动更新)</h4>
        <div id="fieldDebugContent">暂无数据，请点击「加载单据」选择记录</div>
    </div>
    <div id="errorTip" class="error-tip no-print" style="display: none;"></div>

    <!-- 单据主体 -->
    <div class="invoice-container">
        <div class="invoice-title">金时出库单</div>

        <!-- 头部：客户、日期、结算方式、结算金额/克、出库单号 -->
        <div class="header-grid">
            <div class="header-item"><span class="header-label">客户</span><span class="field-value" id="field_customer"></span></div>
            <div class="header-item"><span class="header-label">日期</span><span class="field-value" id="field_date"></span></div>
            <div class="header-item"><span class="header-label">结算方式</span><span class="field-value" id="field_settle_method"></span></div>
            <div class="header-item"><span class="header-label">结算金额/克</span><span class="field-value" id="field_settle_per_gram"></span></div>
            <div class="header-item"><span class="header-label">出库单号</span><span class="field-value" id="field_out_no"></span></div>
        </div>

        <!-- 明细表格：10个字段按顺序排为5行2列 -->
        <div class="detail-section">
            <table class="detail-table">
                <tr>
                    <td class="label-cell">产品名称</td>
                    <td class="value-cell" id="field_product_name"></td>
                    <td class="label-cell">材质</td>
                    <td class="value-cell" id="field_material"></td>
                </tr>
                <tr>
                    <td class="label-cell">总重</td>
                    <td class="value-cell" id="field_total_weight"></td>
                    <td class="label-cell">净金重</td>
                    <td class="value-cell" id="field_net_gold_weight"></td>
                </tr>
                <tr>
                    <td class="label-cell">工费单价</td>
                    <td class="value-cell" id="field_labor_price"></td>
                    <td class="label-cell">实售附加</td>
                    <td class="value-cell" id="field_actual_extra"></td>
                </tr>
                <tr>
                    <td class="label-cell">抵料克重</td>
                    <td class="value-cell" id="field_offset_weight"></td>
                    <td class="label-cell">需补料重</td>
                    <td class="value-cell" id="field_need_supply"></td>
                </tr>
                <tr>
                    <td class="label-cell">旧换工费</td>
                    <td class="value-cell" id="field_old_exchange_fee"></td>
                    <td class="label-cell">总价</td>
                    <td class="value-cell" id="field_total_price"></td>
                </tr>
                <!-- 备注行去掉，因为未要求 -->
            </table>
        </div>

        <!-- 底部：制单人、客户签收 (去掉审核人、打印时间) -->
        <div class="footer-info">
            <div class="signature">
                <span>制单人：</span>
                <span>客户签收：</span>
            </div>
            <!-- 打印时间已移除 -->
        </div>
    </div>

    <script>
        (function() {
            // ---------- 辅助函数 ----------
            function showError(msg) {
                const errTip = document.getElementById('errorTip');
                errTip.textContent = `❌ 错误：${msg}`;
                errTip.style.display = 'block';
                console.error(msg);
            }
            function hideError() {
                document.getElementById('errorTip').style.display = 'none';
            }

            // 提取字段通用函数：根据字段定义获取值
            function extractFieldValue(fields, fieldId, rule) {
                if (!fields || !fieldId) return '';
                const raw = fields[fieldId];
                if (raw === undefined || raw === null) return '';

                // rule 可以是 'text', 'value', 'number', 'date', 'joinText', 或直接返回原始值
                if (rule === 'text') {
                    // 如果是数组，取第一个元素的text；如果是对象直接取text；否则转字符串
                    if (Array.isArray(raw) && raw.length > 0) {
                        const first = raw[0];
                        return (first && typeof first === 'object' && first.text) ? first.text : String(first);
                    } else if (typeof raw === 'object' && raw !== null) {
                        return raw.text !== undefined ? raw.text : String(raw);
                    }
                    return String(raw);
                }
                else if (rule === 'value') {
                    // 取对象的value属性
                    if (Array.isArray(raw) && raw.length > 0) {
                        const first = raw[0];
                        return (first && typeof first === 'object' && first.value !== undefined) ? first.value : String(first);
                    } else if (typeof raw === 'object' && raw !== null) {
                        return raw.value !== undefined ? raw.value : String(raw);
                    }
                    return String(raw);
                }
                else if (rule === 'number') {
                    // 转为数字，保留两位小数？直接返回数值，显示时格式化
                    const num = parseFloat(raw);
                    return isNaN(num) ? '' : num;
                }
                else if (rule === 'date') {
                    // 处理毫秒时间戳，转换为北京时间 yyyy-mm-dd
                    if (typeof raw === 'number' || !isNaN(Date.parse(raw))) {
                        let ts = raw;
                        // 如果大于 1000000000000 说明是毫秒，否则可能是秒？先判断常见情况
                        if (typeof ts === 'number' && ts > 1000000000000) {
                            ts = ts; // 已经是毫秒
                        } else if (typeof ts === 'number' && ts < 10000000000) {
                            ts = ts * 1000; // 假设是秒
                        } else if (typeof ts === 'string' && /^\d+$/.test(ts)) {
                            ts = parseInt(ts);
                            if (ts > 1000000000000) ts = ts; else ts = ts * 1000;
                        }
                        const date = new Date(ts);
                        if (!isNaN(date.getTime())) {
                            const year = date.getFullYear();
                            const month = (date.getMonth() + 1).toString().padStart(2,'0');
                            const day = date.getDate().toString().padStart(2,'0');
                            return `${year}-${month}-${day}`;
                        }
                    }
                    return '';
                }
                else if (rule === 'joinText') {
                    // 数组每个元素取text后拼接
                    if (Array.isArray(raw)) {
                        const texts = raw.map(item => {
                            if (item && typeof item === 'object' && item.text) return item.text;
                            return String(item);
                        }).filter(t => t.trim() !== '');
                        return texts.join('、');
                    } else if (typeof raw === 'object' && raw !== null && raw.text) {
                        return raw.text;
                    }
                    return String(raw);
                }
                else {
                    // 默认直接返回原始值，如果是对象则尝试toString
                    return typeof raw === 'object' ? JSON.stringify(raw) : String(raw);
                }
            }

            // 渲染调试面板
            function renderDebugFields(fields, recordId) {
                const container = document.getElementById('fieldDebugContent');
                if (!fields || Object.keys(fields).length === 0) {
                    container.innerHTML = '⚠️ 该记录没有字段数据';
                    return;
                }
                let html = `<p><strong>记录ID：</strong> ${recordId}</p>`;
                html += '<div class="field-list">';
                for (const [key, value] of Object.entries(fields)) {
                    let display = value;
                    if (typeof value === 'object') {
                        try {
                            display = JSON.stringify(value).substring(0, 60) + (JSON.stringify(value).length > 60 ? '…' : '');
                        } catch (e) {
                            display = '[复杂对象]';
                        }
                    }
                    html += `<div class="field-item"><strong>${key}</strong> : ${display}</div>`;
                }
                html += '</div>';
                container.innerHTML = html;
            }

            // 根据映射填充页面
            function fillForm(fields) {
                // 头部
                setFieldValue('field_customer', extractFieldValue(fields, 'fldRZ3f48d', 'text'));
                setFieldValue('field_date', extractFieldValue(fields, 'fldlqphDO1', 'date'));
                setFieldValue('field_settle_method', extractFieldValue(fields, 'fldU0bZp9j', 'text'));
                setFieldValue('field_settle_per_gram', extractFieldValue(fields, 'fldBP8qj8G', 'number'));
                setFieldValue('field_out_no', extractFieldValue(fields, 'fldBH4bIGR', 'value'));

                // 表格
                setFieldValue('field_product_name', extractFieldValue(fields, 'fldfwaBoti', 'joinText'));
                setFieldValue('field_material', extractFieldValue(fields, 'fldXBLcZ1R', 'text'));
                setFieldValue('field_total_weight', extractFieldValue(fields, 'fldTl9D94f', 'number'));
                setFieldValue('field_net_gold_weight', extractFieldValue(fields, 'fldskrMb67', 'number'));
                setFieldValue('field_labor_price', extractFieldValue(fields, 'fldwryId9s', 'number'));
                setFieldValue('field_actual_extra', extractFieldValue(fields, 'fld4taZPc3', 'number'));
                setFieldValue('field_offset_weight', extractFieldValue(fields, 'fldskrMb67', 'number')); // 与净金重相同字段，按需求保留
                setFieldValue('field_need_supply', extractFieldValue(fields, 'fldpUwDne6', 'number'));
                setFieldValue('field_old_exchange_fee', extractFieldValue(fields, 'flduElGPI0', 'number'));
                setFieldValue('field_total_price', extractFieldValue(fields, 'fld7SS6pKr', 'number'));

                // 对数值字段进行格式化显示（保留两位小数）
                document.querySelectorAll('[id^="field_"]').forEach(el => {
                    if (el.id.includes('weight') || el.id.includes('price') || el.id.includes('fee') || el.id.includes('total') || el.id.includes('per_gram')) {
                        const raw = el.innerText;
                        if (raw && !isNaN(raw) && raw !== '') {
                            const num = parseFloat(raw);
                            el.innerText = num.toFixed(2);
                        }
                    }
                });
            }

            function setFieldValue(id, value) {
                const el = document.getElementById(id);
                if (el) {
                    el.innerText = (value === '' || value === null || value === undefined) ? '—' : value;
                }
            }

            // ---------- 核心：加载数据 ----------
            window.loadSelectedData = async function() {
                hideError();
                try {
                    if (!window.bitable || !window.bitable.base || !window.bitable.ui) {
                        throw new Error('飞书SDK未加载');
                    }
                    const base = window.bitable.base;
                    const selection = await base.getSelection();
                    let tableId = selection?.tableId;
                    let viewId = selection?.viewId;
                    if (!tableId) {
                        const activeTable = await base.getActiveTable();
                        tableId = activeTable?.id;
                        viewId = activeTable?.activeViewId;
                    }
                    if (!tableId || !viewId) throw new Error('无法获取表格/视图');

                    // 选择记录 (单选，但SDK返回数组)
                    const selectedIds = await window.bitable.ui.selectRecordIdList(tableId, viewId);
                    if (!selectedIds || selectedIds.length === 0) throw new Error('未选择记录');
                    const targetId = selectedIds[0];
                    if (selectedIds.length > 1) console.warn('选择了多条记录，仅加载第一条');

                    const table = await base.getActiveTable();
                    if (!table) throw new Error('无法获取表格实例');

                    // 获取记录
                    let record = null;
                    try {
                        record = await table.getRecordById(targetId);
                    } catch (e) {
                        // 备选：拉取列表后筛选
                        const recordsData = await table.getRecordList();
                        let recordsArray = [];
                        if (Array.isArray(recordsData)) recordsArray = recordsData;
                        else if (recordsData?.recordList) recordsArray = recordsData.recordList;
                        else if (recordsData?.records) recordsArray = recordsData.records;
                        record = recordsArray.find(r => {
                            const id = r.recordId || r.id || r._id || r.record_id;
                            return String(id) === String(targetId);
                        });
                    }

                    if (!record) throw new Error('未找到对应记录');

                    const fields = record.fields || record;
                    console.log('✅ 选中记录字段:', fields);
                    console.table(fields);  // 控制台表格展示

                    renderDebugFields(fields, targetId);
                    fillForm(fields);

                } catch (err) {
                    console.error(err);
                    showError(err.message);
                    document.getElementById('fieldDebugContent').innerHTML = `加载失败：${err.message}`;
                }
            };

            // 打印
            window.printDocument = function() {
                // 简单检查是否有数据
                const customer = document.getElementById('field_customer').innerText;
                if (customer === '' || customer === '—') {
                    showError('请先加载有效数据再打印');
                    return;
                }
                if (window.bitable?.base?.print) {
                    window.bitable.base.print({ fail: () => window.print() });
                } else {
                    window.print();
                }
            };

            // 初始化清空所有字段显示为占位符
            window.onload = function() {
                const placeholders = document.querySelectorAll('.field-value');
                placeholders.forEach(el => el.innerText = '—');
            };
        })();
    </script>
</body>
</html>
