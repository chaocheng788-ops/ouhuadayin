<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金时出库单-A4打印模板（飞书多维表版）</title>
    <style>
        /* 保留所有原有样式，仅调整数据选择区 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 20px;
        }

        /* 数据选择区（简化，仅保留按钮） */
        .data-select {
            width: 300px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .data-select h3 {
            margin-bottom: 15px;
            color: #333;
        }
        /* 选中数据预览（新增：展示已选数据） */
        .selected-data-preview {
            padding: 10px;
            border: 1px dashed #1677ff;
            border-radius: 4px;
            margin: 15px 0;
            min-height: 60px;
            display: flex;
            align-items: center;
            color: #666;
        }
        .selected-data-preview.has-data {
            color: #333;
            background-color: #f0f7ff;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            flex-direction: column;
        }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-pick {
            background-color: #1677ff;
            color: #fff;
        }
        .btn-print {
            background-color: #52c41a;
            color: #fff;
        }

        /* A4打印预览区（和之前完全一致） */
        .print-preview {
            flex: 1;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .print-preview h3 {
            margin-bottom: 15px;
            color: #333;
            text-align: center;
        }
        .a4-paper {
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            padding: 20mm;
            border: 1px solid #ddd;
            background: #fff;
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
        }
        .outbound-order {
            width: 100%;
        }
        .order-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .order-header h2 {
            font-size: 20px;
            margin-bottom: 10px;
        }
        .order-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .order-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .order-table th, .order-table td {
            border: 1px solid #000;
            padding: 8px;
            text-align: center;
        }
        .order-footer {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        /* 打印样式（和之前完全一致） */
        @media print {
            body {
                background: none;
                padding: 0;
            }
            .container {
                display: block;
                max-width: none;
                margin: 0;
            }
            .data-select, .print-preview h3 {
                display: none;
            }
            .print-preview {
                padding: 0;
                background: none;
                box-shadow: none;
            }
            .a4-paper {
                width: 210mm;
                height: 297mm;
                border: none;
                box-shadow: none;
                margin: 0;
                padding: 0;
            }
            @page {
                size: A4;
                margin: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 数据选择区（改为飞书多维表选择按钮） -->
        <div class="data-select">
            <h3>出库单数据选择</h3>
            <button class="btn-pick" id="pickFeishuBaseData">选择飞书多维表数据</button>
            
            <!-- 已选数据预览 -->
            <div class="selected-data-preview" id="selectedPreview">
                未选择任何数据
            </div>

            <div class="btn-group">
                <button class="btn-print" id="printBtn" disabled onclick="window.print()">打印出库单</button>
            </div>
        </div>

        <!-- A4打印预览区（结构不变） -->
        <div class="print-preview">
            <h3>A4打印预览</h3>
            <div class="a4-paper">
                <div class="outbound-order">
                    <div class="order-header">
                        <h2>金时出库单</h2>
                    </div>
                    <div class="order-info">
                        <div>
                            <span>客户：<span id="preview-customer">【客户】</span></span>
                            &nbsp;&nbsp;&nbsp;&nbsp;
                            <span>对方名称：<span id="preview-opponent">【对方名称】</span></span>
                        </div>
                        <div>日期：<span id="preview-date">【日期】</span></div>
                    </div>
                    <div class="order-info">
                        <div>结算方式：<span id="preview-settle">【结算方式】</span></div>
                        <div>结算金价/克：<span id="preview-gold-price">【结算金价/克】</span></div>
                        <div>出库单号：<span id="preview-order-no">【出库单号】</span></div>
                        <div>支付方式：<span id="preview-pay-type">【支付方式】</span></div>
                    </div>
                    <table class="order-table">
                        <thead>
                            <tr>
                                <th>材质</th>
                                <th>产品名称</th>
                                <th>总重</th>
                                <th>净重</th>
                                <th>工费单价</th>
                                <th>实售附加</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td id="preview-material">【材质】</td>
                                <td id="preview-product">【产品名称】</td>
                                <td id="preview-total-weight">【总重】</td>
                                <td id="preview-net-weight">【净重】</td>
                                <td id="preview-fee-unit">【工费单价】</td>
                                <td id="preview-additional">【实售附加】</td>
                            </tr>
                        </tbody>
                    </table>
                    <table class="order-table">
                        <tbody>
                            <tr>
                                <th>抵料克重</th>
                                <th>需补料重</th>
                                <th>旧换工费</th>
                                <th>总价</th>
                            </tr>
                            <tr>
                                <td id="preview-offset-weight">【抵料克重】</td>
                                <td id="preview-supplement-weight">【需补料重】</td>
                                <td id="preview-old-fee">【旧换工费】</td>
                                <td id="preview-total-price">【总价】</td>
                            </tr>
                        </tbody>
                    </table>
                    <div class="order-footer">
                        <div>制单人：<span id="preview-maker">【制单人】</span></div>
                        <div>客户签收：<span id="preview-sign">【客户签收】</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 引入飞书SDK（和你仓库文件对应） -->
    <script src="./lark-sdk.umd.js"></script>

    <script>
        // 全局变量：存储选中的多维表数据
        let selectedBaseData = null;
        // 飞书多维表配置（需替换为你自己的多维表信息）
        const BASE_CONFIG = {
            appToken: "你的多维表应用Token", // 多维表设置-开发信息-App Token
            tableId: "你的数据表ID",           // 数据表-设置-数据表ID
            fieldMap: { // 多维表字段ID → 出库单字段映射（需替换为你的实际字段ID）
                "fldxxxxxxxx1": "出库单号",
                "fldxxxxxxxx2": "客户",
                "fldxxxxxxxx3": "对方名称",
                "fldxxxxxxxx4": "日期",
                "fldxxxxxxxx5": "结算方式",
                "fldxxxxxxxx6": "结算金价/克",
                "fldxxxxxxxx7": "支付方式",
                "fldxxxxxxxx8": "材质",
                "fldxxxxxxxx9": "产品名称",
                "fldxxxxxxxx10": "总重",
                "fldxxxxxxxx11": "净重",
                "fldxxxxxxxx12": "工费单价",
                "fldxxxxxxxx13": "实售附加",
                "fldxxxxxxxx14": "抵料克重",
                "fldxxxxxxxx15": "需补料重",
                "fldxxxxxxxx16": "旧换工费",
                "fldxxxxxxxx17": "总价",
                "fldxxxxxxxx18": "制单人",
                "fldxxxxxxxx19": "客户签收"
            }
        };

        // 初始化飞书SDK（极简版，无需appId授权，适配多维表选择器）
        if (window.lark) {
            lark.init({
                timeout: 5000
            });
            console.log("飞书SDK初始化成功");
        } else {
            alert("飞书SDK加载失败，请检查lark-sdk.umd.js文件路径！");
        }

        // 核心：点击按钮弹出飞书多维表选择弹窗
        document.getElementById('pickFeishuBaseData').addEventListener('click', async () => {
            if (!window.lark) return;

            try {
                // 调用飞书多维表记录选择器（单选模式）
                const res = await lark.base.openRecordPicker({
                    appToken: BASE_CONFIG.appToken,
                    tableId: BASE_CONFIG.tableId,
                    multiple: false, // 单选：关键配置
                    size: "middle"   // 弹窗尺寸：small/middle/large
                });

                // 无选择数据则返回
                if (!res || !res.records || res.records.length === 0) {
                    alert("未选择任何数据");
                    return;
                }

                // 解析选中的多维表数据（映射为出库单字段）
                const selectedRecord = res.records[0]; // 单选取第一个
                selectedBaseData = {};
                // 遍历字段映射，转换多维表数据格式
                for (const [fieldId, fieldName] of Object.entries(BASE_CONFIG.fieldMap)) {
                    // 适配飞书多维表不同字段类型的取值逻辑
                    const fieldValue = selectedRecord.fields[fieldId];
                    if (typeof fieldValue === 'undefined') {
                        selectedBaseData[fieldName] = "";
                    } else if (Array.isArray(fieldValue)) {
                        selectedBaseData[fieldName] = fieldValue.join(","); // 多选项拼接
                    } else if (fieldValue?.text) {
                        selectedBaseData[fieldName] = fieldValue.text; // 关联字段取文本
                    } else {
                        selectedBaseData[fieldName] = String(fieldValue); // 基础字段直接转字符串
                    }
                }

                // 更新已选数据预览
                const previewDom = document.getElementById('selectedPreview');
                previewDom.textContent = `已选：${selectedBaseData['出库单号']} - ${selectedBaseData['客户']}`;
                previewDom.classList.add('has-data');

                // 渲染A4预览区
                renderPreview(selectedBaseData);

                // 控制台打印完整数据详情（格式化）
                console.log('===== 选中的飞书多维表出库单数据 =====');
                console.log(JSON.stringify(selectedBaseData, null, 2));

                // 启用打印按钮
                document.getElementById('printBtn').disabled = false;
                alert("数据选择成功！可点击打印按钮输出A4出库单");

            } catch (err) {
                console.error("飞书多维表选择失败：", err);
                // 兼容飞书SDK错误码
                if (err.code === "USER_CANCEL") {
                    alert("你取消了数据选择");
                } else {
                    alert(`选择失败：${err.message || "请检查多维表配置/权限"}`);
                }
            }
        });

        // 渲染预览区数据
        function renderPreview(data) {
            document.getElementById('preview-customer').textContent = data['客户'] || "";
            document.getElementById('preview-opponent').textContent = data['对方名称'] || "";
            document.getElementById('preview-date').textContent = data['日期'] || "";
            document.getElementById('preview-settle').textContent = data['结算方式'] || "";
            document.getElementById('preview-gold-price').textContent = data['结算金价/克'] || "";
            document.getElementById('preview-order-no').textContent = data['出库单号'] || "";
            document.getElementById('preview-pay-type').textContent = data['支付方式'] || "";
            document.getElementById('preview-material').textContent = data['材质'] || "";
            document.getElementById('preview-product').textContent = data['产品名称'] || "";
            document.getElementById('preview-total-weight').textContent = data['总重'] || "";
            document.getElementById('preview-net-weight').textContent = data['净重'] || "";
            document.getElementById('preview-fee-unit').textContent = data['工费单价'] || "";
            document.getElementById('preview-additional').textContent = data['实售附加'] || "";
            document.getElementById('preview-offset-weight').textContent = data['抵料克重'] || "";
            document.getElementById('preview-supplement-weight').textContent = data['需补料重'] || "";
            document.getElementById('preview-old-fee').textContent = data['旧换工费'] || "";
            document.getElementById('preview-total-price').textContent = data['总价'] || "";
            document.getElementById('preview-maker').textContent = data['制单人'] || "";
            document.getElementById('preview-sign').textContent = data['客户签收'] || "";
        }
    </script>
</body>
</html>
