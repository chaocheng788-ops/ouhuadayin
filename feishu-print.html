<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金时出库单 - 自动读取勾选记录</title>
    <script src="lark-sdk.umd.js" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '仿宋', 'SimSun', serif;
        }
        body {
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            padding: 10mm 12mm;
            background: #fff;
            font-size: 14px;
            line-height: 1.5;
            color: #000;
        }
        @media print {
            .no-print {
                display: none !important;
            }
            body {
                padding: 5mm 8mm;
            }
            @page {
                size: A4;
                margin: 10mm 12mm;
            }
            .field-value {
                border-bottom: 1px solid #000 !important;
            }
        }
        .btn-group {
            position: fixed;
            top: 15px;
            right: 20px;
            z-index: 999;
            display: flex;
            gap: 8px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .btn-primary { background: #007fff; }
        .btn-primary:hover { background: #0066cc; }
        .btn-success { background: #2ecc71; }
        .btn-success:hover { background: #27ae60; }
        .btn-refresh { background: #f39c12; }
        .btn-refresh:hover { background: #e67e22; }
        .error-tip {
            background: #ffebee;
            border-left: 4px solid #d32f2f;
            padding: 10px 15px;
            margin: 15px 0;
            color: #b71c1c;
        }
        .info-tip {
            background: #e8f0fe;
            border-left: 4px solid #007fff;
            padding: 10px 15px;
            margin: 15px 0;
            color: #0056b3;
        }
        .invoice-title {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 4px;
            margin-bottom: 16px;
            border-bottom: 2px solid #333;
            padding-bottom: 8px;
        }
        .header-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px 15px;
            border: 1px solid #333;
            padding: 12px 15px;
            margin-bottom: 24px;
            background: #fefefe;
        }
        .header-item {
            display: flex;
            align-items: baseline;
        }
        .header-label {
            font-weight: 600;
            width: 75px;
            flex-shrink: 0;
            color: #2c3e50;
        }
        .header-label::after {
            content: "：";
        }
        .field-value {
            flex: 1;
            border-bottom: 1px dashed #666;
            min-height: 22px;
            padding: 0 4px;
            color: #0b1f33;
        }
        .detail-section {
            margin: 24px 0 16px;
            border: 1px solid #333;
        }
        .detail-table {
            width: 100%;
            border-collapse: collapse;
        }
        .detail-table td {
            border: 1px solid #333;
            padding: 10px 8px;
            vertical-align: middle;
        }
        .label-cell {
            font-weight: 600;
            background-color: #f3f3f3;
            width: 15%;
            white-space: nowrap;
            text-align: center;
        }
        .value-cell {
            width: 35%;
            text-align: left;
            padding-left: 12px;
        }
        .footer-info {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            border-top: 1px dashed #333;
            padding-top: 12px;
            font-size: 14px;
        }
        .signature-left {
            border-bottom: 1px solid #333;
            min-width: 120px;
            display: inline-block;
            text-align: center;
        }
        .signature-right {
            border-bottom: 1px solid #333;
            min-width: 120px;
            display: inline-block;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="btn-group no-print">
        <button class="btn btn-refresh" id="refreshBtn">🔄 刷新</button>
        <button class="btn btn-success" id="printBtn">🖨️ 打印</button>
    </div>

    <div id="infoTip" class="info-tip no-print" style="display: none;"></div>
    <div id="errorTip" class="error-tip no-print" style="display: none;"></div>

    <div class="invoice-container">
        <div class="invoice-title">金时出库单</div>

        <div class="header-grid">
            <div class="header-item"><span class="header-label">客户</span><span class="field-value" id="field_customer">—</span></div>
            <div class="header-item"><span class="header-label">日期</span><span class="field-value" id="field_date">—</span></div>
            <div class="header-item"><span class="header-label">结算方式</span><span class="field-value" id="field_settle_method">—</span></div>
            <div class="header-item"><span class="header-label">结算金额/克</span><span class="field-value" id="field_settle_per_gram">—</span></div>
            <div class="header-item"><span class="header-label">出库单号</span><span class="field-value" id="field_out_no">—</span></div>
        </div>

        <div class="detail-section">
            <table class="detail-table">
                <tr><td class="label-cell">产品名称</td><td class="value-cell" id="field_product_name">—</td>
                    <td class="label-cell">材质</td><td class="value-cell" id="field_material">—</td></tr>
                <tr><td class="label-cell">总重</td><td class="value-cell" id="field_total_weight">—</td>
                    <td class="label-cell">净金重</td><td class="value-cell" id="field_net_gold_weight">—</td></tr>
                <tr><td class="label-cell">工费单价</td><td class="value-cell" id="field_labor_price">—</td>
                    <td class="label-cell">实售附加</td><td class="value-cell" id="field_actual_extra">—</td></tr>
                <tr><td class="label-cell">抵料克重</td><td class="value-cell" id="field_offset_weight">—</td>
                    <td class="label-cell">需补料重</td><td class="value-cell" id="field_need_supply">—</td></tr>
                <tr><td class="label-cell">旧换工费</td><td class="value-cell" id="field_old_exchange_fee">—</td>
                    <td class="label-cell">总价</td><td class="value-cell" id="field_total_price">—</td></tr>
            </table>
        </div>

        <div class="footer-info">
            <div><span class="signature-left">制单人：</span></div>
            <div><span class="signature-right">客户签收：</span></div>
        </div>
    </div>

    <script>
        (function() {
            // 显示短暂提示
            function showInfo(msg) {
                const infoDiv = document.getElementById('infoTip');
                infoDiv.textContent = msg;
                infoDiv.style.display = 'block';
                setTimeout(() => { if(infoDiv) infoDiv.style.display = 'none'; }, 4000);
            }
            function showError(msg) {
                const errDiv = document.getElementById('errorTip');
                errDiv.textContent = `❌ ${msg}`;
                errDiv.style.display = 'block';
                console.error(msg);
            }
            function hideMessages() {
                const infoDiv = document.getElementById('infoTip');
                const errDiv = document.getElementById('errorTip');
                if(infoDiv) infoDiv.style.display = 'none';
                if(errDiv) errDiv.style.display = 'none';
            }

            // 字段提取逻辑
            function extractFieldValue(fields, fieldId, rule) {
                if (!fields || !fieldId) return '';
                const raw = fields[fieldId];
                if (raw === undefined || raw === null) return '';
                if (rule === 'text') {
                    if (Array.isArray(raw) && raw.length > 0) {
                        const first = raw[0];
                        return (first && typeof first === 'object' && first.text) ? first.text : String(first);
                    } else if (typeof raw === 'object' && raw !== null) {
                        return raw.text !== undefined ? raw.text : String(raw);
                    }
                    return String(raw);
                }
                else if (rule === 'value') {
                    if (Array.isArray(raw) && raw.length > 0) {
                        const first = raw[0];
                        return (first && typeof first === 'object' && first.value !== undefined) ? first.value : String(first);
                    } else if (typeof raw === 'object' && raw !== null) {
                        return raw.value !== undefined ? raw.value : String(raw);
                    }
                    return String(raw);
                }
                else if (rule === 'number') {
                    const num = parseFloat(raw);
                    return isNaN(num) ? '' : num;
                }
                else if (rule === 'date') {
                    let ts = raw;
                    if (typeof ts === 'number' && ts > 1000000000000) ts = ts;
                    else if (typeof ts === 'number' && ts < 10000000000) ts = ts * 1000;
                    else if (typeof ts === 'string' && /^\d+$/.test(ts)) {
                        ts = parseInt(ts);
                        if (ts > 1000000000000) ts = ts; else ts = ts * 1000;
                    }
                    const date = new Date(ts);
                    if (!isNaN(date.getTime())) {
                        const year = date.getFullYear();
                        const month = (date.getMonth() + 1).toString().padStart(2,'0');
                        const day = date.getDate().toString().padStart(2,'0');
                        return `${year}-${month}-${day}`;
                    }
                    return '';
                }
                else if (rule === 'joinText') {
                    if (Array.isArray(raw)) {
                        const texts = raw.map(item => {
                            if (item && typeof item === 'object' && item.text) return item.text;
                            return String(item);
                        }).filter(t => t.trim() !== '');
                        return texts.join('、');
                    } else if (typeof raw === 'object' && raw !== null && raw.text) {
                        return raw.text;
                    }
                    return String(raw);
                }
                else {
                    return typeof raw === 'object' ? JSON.stringify(raw) : String(raw);
                }
            }

            function setFieldValue(id, value) {
                const el = document.getElementById(id);
                if (el) {
                    el.innerText = (value === '' || value === null || value === undefined) ? '—' : value;
                }
            }

            function fillForm(fields) {
                // 头部
                setFieldValue('field_customer', extractFieldValue(fields, 'fldRZ3f48d', 'text'));
                setFieldValue('field_date', extractFieldValue(fields, 'fldlqphDO1', 'date'));
                setFieldValue('field_settle_method', extractFieldValue(fields, 'fldU0bZp9j', 'text'));
                setFieldValue('field_settle_per_gram', extractFieldValue(fields, 'fldBP8qj8G', 'number'));
                setFieldValue('field_out_no', extractFieldValue(fields, 'fldBH4bIGR', 'value'));

                // 明细
                setFieldValue('field_product_name', extractFieldValue(fields, 'fldfwaBoti', 'joinText'));
                setFieldValue('field_material', extractFieldValue(fields, 'fldXBLcZ1R', 'text'));
                setFieldValue('field_total_weight', extractFieldValue(fields, 'fldTl9D94f', 'number'));
                setFieldValue('field_net_gold_weight', extractFieldValue(fields, 'fldskrMb67', 'number'));
                setFieldValue('field_labor_price', extractFieldValue(fields, 'fldwryId9s', 'number'));
                setFieldValue('field_actual_extra', extractFieldValue(fields, 'fld4taZPc3', 'number'));
                setFieldValue('field_offset_weight', extractFieldValue(fields, 'fldskrMb67', 'number'));
                setFieldValue('field_need_supply', extractFieldValue(fields, 'fldpUwDne6', 'number'));
                setFieldValue('field_old_exchange_fee', extractFieldValue(fields, 'flduElGPI0', 'number'));
                setFieldValue('field_total_price', extractFieldValue(fields, 'fld7SS6pKr', 'number'));

                // 数值格式化
                document.querySelectorAll('[id^="field_"]').forEach(el => {
                    if (el.id.includes('weight') || el.id.includes('price') || el.id.includes('fee') || el.id.includes('total') || el.id.includes('per_gram')) {
                        const raw = el.innerText;
                        if (raw && !isNaN(raw) && raw !== '') {
                            const num = parseFloat(raw);
                            el.innerText = num.toFixed(2);
                        }
                    }
                });
            }

            // 核心：从当前勾选记录中获取数据
            async function loadFromSelectedRecords() {
                hideMessages();
                try {
                    // 检查SDK
                    if (!window.bitable || !window.bitable.base) {
                        throw new Error('飞书SDK未加载或不在飞书多维表格环境中');
                    }
                    const base = window.bitable.base;
                    
                    // 获取当前视图中选中的记录ID列表（用户手动勾选的行）
                    const selection = await base.getSelection();
                    console.log('getSelection 结果:', selection);
                    let selectedIds = selection?.recordIds || [];
                    if (!selectedIds || selectedIds.length === 0) {
                        showInfo('未勾选任何记录，请在表格视图中勾选一行记录后点击“刷新”');
                        return;
                    }
                    if (selectedIds.length > 1) {
                        showInfo(`您勾选了 ${selectedIds.length} 条记录，模板仅支持显示第一条，将使用第一条数据。`);
                        selectedIds = [selectedIds[0]];
                    }
                    const targetId = selectedIds[0];
                    const table = await base.getActiveTable();
                    if (!table) throw new Error('无法获取当前表格实例');

                    let record = null;
                    // 方法1: getRecordById
                    try {
                        record = await table.getRecordById(targetId);
                        console.log('通过 getRecordById 获取记录成功');
                    } catch (err) {
                        console.warn('getRecordById 失败，尝试从 recordList 筛选', err);
                        // 方法2: 获取所有记录后筛选
                        const recordsData = await table.getRecordList();
                        let recordsArray = [];
                        if (Array.isArray(recordsData)) recordsArray = recordsData;
                        else if (recordsData?.recordList) recordsArray = recordsData.recordList;
                        else if (recordsData?.records) recordsArray = recordsData.records;
                        record = recordsArray.find(r => {
                            const id = r.recordId || r.id || r._id || r.record_id;
                            return String(id) === String(targetId);
                        });
                    }
                    if (!record) throw new Error(`未找到 ID 为 ${targetId} 的记录`);

                    const fields = record.fields || record;
                    console.log('自动读取勾选记录字段详情:');
                    console.table(fields);
                    fillForm(fields);
                    showInfo('数据加载成功，可点击打印');
                } catch (err) {
                    console.error('刷新失败:', err);
                    showError(err.message);
                }
            }

            // 将刷新函数挂载到 window，并确保按钮事件绑定
            window.refreshFromSelection = loadFromSelectedRecords;
            
            // 打印函数
            window.printDocument = function() {
                const customer = document.getElementById('field_customer').innerText;
                if (customer === '' || customer === '—') {
                    showError('请先勾选记录并点击刷新加载数据后再打印');
                    return;
                }
                if (window.bitable?.base?.print) {
                    window.bitable.base.print({ fail: () => window.print() });
                } else {
                    window.print();
                }
            };

            // 页面加载完成后，绑定按钮事件（防止动态元素未加载）
            document.addEventListener('DOMContentLoaded', () => {
                const refreshBtn = document.getElementById('refreshBtn');
                const printBtn = document.getElementById('printBtn');
                if (refreshBtn) {
                    refreshBtn.onclick = () => { loadFromSelectedRecords(); };
                }
                if (printBtn) {
                    printBtn.onclick = () => { window.printDocument(); };
                }
                // 初始加载一次
                loadFromSelectedRecords();
            });
        })();
    </script>
</body>
</html>
