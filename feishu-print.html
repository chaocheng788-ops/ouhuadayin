<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金时出库单 (新版布局)</title>
    <script src="lark-sdk.umd.js" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '仿宋', 'SimSun', serif;
        }
        body {
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            padding: 10mm 12mm;
            background: #fff;
            font-size: 14px;
            line-height: 1.5;
            color: #000;
        }
        @media print {
            .no-print { display: none !important; }
            body { padding: 5mm 8mm; }
            @page { size: A4; margin: 10mm 12mm; }
            .field-value { border-bottom: 1px solid #000 !important; }
        }

        .btn-group {
            position: fixed;
            top: 15px;
            right: 20px;
            z-index: 999;
            display: flex;
            gap: 8px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .btn-primary { background: #007fff; }
        .btn-primary:hover { background: #0066cc; }
        .btn-success { background: #2ecc71; }
        .btn-success:hover { background: #27ae60; }
        .error-tip {
            background: #ffebee;
            border-left: 4px solid #d32f2f;
            padding: 10px 15px;
            margin: 15px 0;
            color: #b71c1c;
        }

        .invoice-title {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 4px;
            margin-bottom: 16px;
            border-bottom: 2px solid #333;
            padding-bottom: 8px;
        }

        /* 顶部信息区：三列两行网格 */
        .header-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px 20px;
            border: 1px solid #333;
            padding: 12px 15px;
            margin-bottom: 24px;
            background: #fefefe;
        }
        .header-item {
            display: flex;
            align-items: baseline;
        }
        .header-label {
            font-weight: 600;
            width: 70px;
            flex-shrink: 0;
            color: #2c3e50;
        }
        .header-label::after {
            content: "：";
        }
        .field-value {
            flex: 1;
            border-bottom: 1px dashed #666;
            min-height: 22px;
            padding: 0 4px;
            color: #0b1f33;
        }
        /* 位置指定 */
        .pos-customer { grid-column: 1 / 2; grid-row: 1 / 2; }
        .pos-price-per-gram { grid-column: 2 / 3; grid-row: 1 / 2; }
        .pos-date { grid-column: 3 / 4; grid-row: 1 / 2; }
        .pos-settle-method { grid-column: 1 / 2; grid-row: 2 / 3; }
        .pos-out-no { grid-column: 3 / 4; grid-row: 2 / 3; }

        /* 明细表格 (6列) */
        .detail-section {
            margin: 24px 0 16px;
            border: 1px solid #333;
        }
        .detail-table {
            width: 100%;
            border-collapse: collapse;
        }
        .detail-table th, .detail-table td {
            border: 1px solid #333;
            padding: 8px 6px;
            text-align: center;
            vertical-align: middle;
        }
        .detail-table th {
            background-color: #f3f3f3;
            font-weight: 600;
        }
        .detail-table td {
            text-align: left;
            padding-left: 10px;
        }
        .detail-table td.number-cell {
            text-align: right;
            padding-right: 10px;
        }

        /* 右侧信息区（抵料克重、需补料重、旧换工费 + 总价） */
        .right-info {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            margin: 16px 0 20px;
        }
        .info-line {
            display: flex;
            gap: 30px;
            margin-bottom: 12px;
        }
        .info-item {
            display: flex;
            align-items: baseline;
            font-size: 15px;
        }
        .info-label {
            font-weight: 600;
            width: 80px;
        }
        .info-label::after {
            content: "：";
        }
        .info-value {
            min-width: 100px;
            border-bottom: 1px dashed #666;
            padding: 0 4px;
            text-align: right;
        }
        .total-price-line {
            margin-top: 4px;
        }

        /* 底部存料区 */
        .stock-area {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            border-top: 1px dashed #333;
            padding-top: 16px;
            font-size: 15px;
        }
        .stock-item {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        .stock-label {
            font-weight: 600;
        }
        .stock-value {
            min-width: 150px;
            border-bottom: 1px solid #333;
            padding: 0 8px;
        }

        /* 模态框样式 (与之前相同，保留筛选功能) */
        .modal {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(2px);
        }
        .modal-content {
            background-color: #fff;
            margin: 3% auto;
            padding: 20px;
            border-radius: 12px;
            width: 85%;
            max-width: 1300px;
            max-height: 85%;
            overflow-y: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
            padding-bottom: 12px;
            margin-bottom: 16px;
        }
        .modal-header h3 { font-size: 20px; color: #007fff; }
        .close { font-size: 28px; cursor: pointer; color: #aaa; }
        .close:hover { color: black; }
        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            background: #f8f9fc;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            align-items: flex-end;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            min-width: 150px;
        }
        .filter-group label {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #2c3e50;
        }
        .filter-group input {
            padding: 6px 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 13px;
            width: 160px;
        }
        .filter-group input[type="date"] { width: 140px; }
        .filter-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .filter-actions button {
            padding: 6px 12px;
            background: #007fff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .filter-actions button.reset-btn { background: #6c757d; }
        .records-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .records-table th, .records-table td {
            border: 1px solid #ddd;
            padding: 8px 10px;
            text-align: left;
        }
        .records-table th { background: #f2f2f2; position: sticky; top: 0; }
        .records-table tr { cursor: pointer; transition: background 0.2s; }
        .records-table tr:hover { background: #e6f2ff; }
        .no-data { text-align: center; padding: 30px; color: #999; }
    </style>
</head>
<body>
    <div class="btn-group no-print">
        <button class="btn btn-primary" onclick="openRecordSelector()">📋 选择单据</button>
        <button class="btn btn-success" onclick="printDocument()">🖨️ 打印</button>
    </div>
    <div id="errorTip" class="error-tip no-print" style="display: none;"></div>

    <!-- 出库单主体 -->
    <div class="invoice-container">
        <div class="invoice-title">金时出库单</div>

        <!-- 顶部区域：三列双行 -->
        <div class="header-grid">
            <div class="header-item pos-customer"><span class="header-label">客户</span><span class="field-value" id="field_customer"></span></div>
            <div class="header-item pos-price-per-gram"><span class="header-label">结算金价</span><span class="field-value" id="field_settle_per_gram"></span></div>
            <div class="header-item pos-date"><span class="header-label">日期</span><span class="field-value" id="field_date"></span></div>
            <div class="header-item pos-settle-method"><span class="header-label">结算方式</span><span class="field-value" id="field_settle_method"></span></div>
            <div class="header-item pos-out-no"><span class="header-label">出库单号</span><span class="field-value" id="field_out_no"></span></div>
        </div>

        <!-- 明细表格：产品名称、材质、总重、净金重、销售克价、实售附加 -->
        <div class="detail-section">
            <table class="detail-table">
                <thead>
                    <tr><th>产品名称</th><th>材质</th><th>总重</th><th>净金重</th><th>销售克价</th><th>实售附加</th></tr>
                </thead>
                <tbody id="detailRows">
                    <tr><td colspan="6" style="text-align:center; color:#999;">请选择记录加载</td></tr>
                </tbody>
            </table>
        </div>

        <!-- 右侧信息区：抵料克重、需补料重、旧换工费 + 总价 -->
        <div class="right-info">
            <div class="info-line">
                <div class="info-item"><span class="info-label">抵料克重</span><span class="info-value" id="field_offset_weight">—</span></div>
                <div class="info-item"><span class="info-label">需补料重</span><span class="info-value" id="field_need_supply">—</span></div>
                <div class="info-item"><span class="info-label">旧换工费</span><span class="info-value" id="field_old_exchange_fee">—</span></div>
            </div>
            <div class="info-line total-price-line">
                <div class="info-item"><span class="info-label">总价</span><span class="info-value" id="field_total_price" style="min-width:120px;">—</span></div>
            </div>
        </div>

        <!-- 底部存料区：上单存料（左）、本单存料（右） -->
        <div class="stock-area">
            <div class="stock-item"><span class="stock-label">上单存料：</span><span class="stock-value" id="field_last_stock"></span></div>
            <div class="stock-item"><span class="stock-label">本单存料：</span><span class="stock-value" id="field_current_stock"></span></div>
        </div>
    </div>

    <!-- 模态框：多字段筛选记录选择器 -->
    <div id="recordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📋 选择出库记录（支持多条件联动筛选）</h3>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="filter-row">
                <div class="filter-group"><label>客户</label><input type="text" id="filterCustomer" placeholder="模糊匹配" oninput="applyFilters()"></div>
                <div class="filter-group"><label>出库单号</label><input type="text" id="filterOutNo" placeholder="模糊匹配" oninput="applyFilters()"></div>
                <div class="filter-group"><label>产品名称</label><input type="text" id="filterProduct" placeholder="模糊匹配" oninput="applyFilters()"></div>
                <div class="filter-group"><label>材质</label><input type="text" id="filterMaterial" placeholder="模糊匹配" oninput="applyFilters()"></div>
                <div class="filter-group"><label>日期</label><input type="date" id="filterDate" onchange="applyFilters()"></div>
                <div class="filter-actions">
                    <button class="reset-btn" onclick="resetFilters()">重置筛选</button>
                </div>
            </div>
            <div style="overflow-x: auto;">
                <table class="records-table">
                    <thead><tr><th>客户</th><th>出库单号</th><th>产品名称</th><th>材质</th><th>日期</th><th>总重</th><th>操作</th></tr></thead>
                    <tbody id="recordsTbody"><tr><td colspan="7" class="no-data">加载中...</td></tr></tbody>
                </table>
            </div>
            <div style="margin-top: 12px; font-size: 12px; color: #666;">💡 点击任意行加载该单据，所有筛选条件实时联动</div>
        </div>
    </div>

    <script>
        // ---------- 全局变量 ----------
        let allRecords = [];        // 存储展示对象
        let filteredRecords = [];

        // ---------- 辅助函数 ----------
        function showError(msg) { 
            const err = document.getElementById('errorTip');
            err.textContent = `❌ ${msg}`;
            err.style.display = 'block';
            console.error(msg);
        }
        function hideError() { document.getElementById('errorTip').style.display = 'none'; }

        // 字段提取 (复用之前逻辑)
        function extractFieldValue(fields, fieldId, rule) {
            if (!fields || !fieldId) return '';
            const raw = fields[fieldId];
            if (raw === undefined || raw === null) return '';
            if (rule === 'text') {
                if (Array.isArray(raw) && raw.length > 0) {
                    const first = raw[0];
                    return (first && typeof first === 'object' && first.text) ? first.text : String(first);
                } else if (typeof raw === 'object' && raw !== null) return raw.text !== undefined ? raw.text : String(raw);
                return String(raw);
            } else if (rule === 'value') {
                if (Array.isArray(raw) && raw.length > 0) {
                    const first = raw[0];
                    return (first && typeof first === 'object' && first.value !== undefined) ? first.value : String(first);
                } else if (typeof raw === 'object' && raw !== null) return raw.value !== undefined ? raw.value : String(raw);
                return String(raw);
            } else if (rule === 'number') {
                const num = parseFloat(raw);
                return isNaN(num) ? '' : num;
            } else if (rule === 'date') {
                let ts = raw;
                if (typeof ts === 'number' && ts > 1000000000000) { /* 毫秒 */ }
                else if (typeof ts === 'number' && ts < 10000000000) ts = ts * 1000;
                else if (typeof ts === 'string' && /^\d+$/.test(ts)) { ts = parseInt(ts); if (ts < 10000000000) ts = ts * 1000; }
                const date = new Date(ts);
                if (!isNaN(date.getTime())) {
                    const y = date.getFullYear(), m = (date.getMonth()+1).toString().padStart(2,'0'), d = date.getDate().toString().padStart(2,'0');
                    return `${y}-${m}-${d}`;
                }
                return '';
            } else if (rule === 'joinText') {
                if (Array.isArray(raw)) {
                    const texts = raw.map(item => (item && typeof item === 'object' && item.text) ? item.text : String(item)).filter(t => t.trim());
                    return texts.join('、');
                } else if (typeof raw === 'object' && raw !== null && raw.text) return raw.text;
                return String(raw);
            } else return typeof raw === 'object' ? JSON.stringify(raw) : String(raw);
        }

        // 填充主单据 (根据最新布局)
        function fillForm(fields) {
            const setText = (id, val) => { const el = document.getElementById(id); if(el) el.innerText = (val === '' || val == null) ? '—' : val; };
            const setNumber = (id, val) => {
                const el = document.getElementById(id);
                if (!el) return;
                if (val === '' || val == null) el.innerText = '—';
                else { let num = parseFloat(val); el.innerText = isNaN(num) ? '—' : num.toFixed(2); }
            };
            // 顶部字段
            setText('field_customer', extractFieldValue(fields, 'fldRZ3f48d', 'text'));
            setNumber('field_settle_per_gram', extractFieldValue(fields, 'fldBP8qj8G', 'number'));
            setText('field_date', extractFieldValue(fields, 'fldlqphDO1', 'date'));
            setText('field_settle_method', extractFieldValue(fields, 'fldU0bZp9j', 'text'));
            setText('field_out_no', extractFieldValue(fields, 'fldBH4bIGR', 'value'));

            // 明细表格 (只有一行，因为每次只加载一条记录，但为了支持多条？需求是一张单据对应一条记录，故表格只显示当前记录)
            const productName = extractFieldValue(fields, 'fldfwaBoti', 'joinText') || '—';
            const material = extractFieldValue(fields, 'fldXBLcZ1R', 'text') || '—';
            const totalWeight = extractFieldValue(fields, 'fldTl9D94f', 'number');
            const netGold = extractFieldValue(fields, 'fldskrMb67', 'number');
            const salePrice = extractFieldValue(fields, 'fldwryId9s', 'number'); // 销售克价
            const extraFee = extractFieldValue(fields, 'fld4taZPc3', 'number');   // 实售附加
            const formatNum = (v) => (v !== '' && !isNaN(v)) ? parseFloat(v).toFixed(2) : '—';
            const detailHtml = `<tr>
                <td>${escapeHtml(productName)}</td>
                <td>${escapeHtml(material)}</td>
                <td class="number-cell">${formatNum(totalWeight)}</td>
                <td class="number-cell">${formatNum(netGold)}</td>
                <td class="number-cell">${formatNum(salePrice)}</td>
                <td class="number-cell">${formatNum(extraFee)}</td>
            </tr>`;
            document.getElementById('detailRows').innerHTML = detailHtml;

            // 右侧三个字段 + 总价
            setNumber('field_offset_weight', extractFieldValue(fields, 'fldskrMb67', 'number')); // 抵料克重与净金重相同字段
            setNumber('field_need_supply', extractFieldValue(fields, 'fldpUwDne6', 'number'));
            setNumber('field_old_exchange_fee', extractFieldValue(fields, 'flduElGPI0', 'number'));
            setNumber('field_total_price', extractFieldValue(fields, 'fld7SS6pKr', 'number'));

            // 存料字段留空
            document.getElementById('field_last_stock').innerText = '';
            document.getElementById('field_current_stock').innerText = '';
        }
        function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

        // 构建展示记录对象 (用于筛选表格)
        function buildDisplayRecord(recordId, fields) {
            const customer = extractFieldValue(fields, 'fldRZ3f48d', 'text') || '—';
            const outNo = extractFieldValue(fields, 'fldBH4bIGR', 'value') || '—';
            const product = extractFieldValue(fields, 'fldfwaBoti', 'joinText') || '—';
            const material = extractFieldValue(fields, 'fldXBLcZ1R', 'text') || '—';
            const dateStr = extractFieldValue(fields, 'fldlqphDO1', 'date') || '—';
            let totalWeight = extractFieldValue(fields, 'fldTl9D94f', 'number');
            totalWeight = (totalWeight !== '' && !isNaN(totalWeight)) ? parseFloat(totalWeight).toFixed(2) : '—';
            return { recordId, customer, outNo, product, material, date: dateStr, totalWeight, rawFields: fields };
        }

        // 筛选核心
        function applyFilters() {
            const filterCustomer = document.getElementById('filterCustomer').value.trim().toLowerCase();
            const filterOutNo = document.getElementById('filterOutNo').value.trim().toLowerCase();
            const filterProduct = document.getElementById('filterProduct').value.trim().toLowerCase();
            const filterMaterial = document.getElementById('filterMaterial').value.trim().toLowerCase();
            const filterDate = document.getElementById('filterDate').value;
            filteredRecords = allRecords.filter(rec => {
                if (filterCustomer && !rec.customer.toLowerCase().includes(filterCustomer)) return false;
                if (filterOutNo && !rec.outNo.toLowerCase().includes(filterOutNo)) return false;
                if (filterProduct && !rec.product.toLowerCase().includes(filterProduct)) return false;
                if (filterMaterial && !rec.material.toLowerCase().includes(filterMaterial)) return false;
                if (filterDate && rec.date !== filterDate) return false;
                return true;
            });
            renderRecordsTable();
        }
        function resetFilters() {
            document.getElementById('filterCustomer').value = '';
            document.getElementById('filterOutNo').value = '';
            document.getElementById('filterProduct').value = '';
            document.getElementById('filterMaterial').value = '';
            document.getElementById('filterDate').value = '';
            applyFilters();
        }
        function renderRecordsTable() {
            const tbody = document.getElementById('recordsTbody');
            if (!filteredRecords.length) {
                tbody.innerHTML = '<tr><td colspan="7" class="no-data">未找到匹配的记录</td></tr>';
                return;
            }
            let html = '';
            for (let rec of filteredRecords) {
                html += `<tr onclick="selectRecord('${rec.recordId}')">
                            <td>${escapeHtml(rec.customer)}</td>
                            <td>${escapeHtml(rec.outNo)}</td>
                            <td>${escapeHtml(rec.product)}</td>
                            <td>${escapeHtml(rec.material)}</td>
                            <td>${escapeHtml(rec.date)}</td>
                            <td>${rec.totalWeight}</td>
                            <td style="text-align:center">📄 选择</td>
                         </tr>`;
            }
            tbody.innerHTML = html;
        }

        // 选择记录
        window.selectRecord = async function(recordId) {
            const record = allRecords.find(r => r.recordId === recordId);
            if (!record) return;
            fillForm(record.rawFields);
            console.log('✅ 已加载记录:', record.recordId);
            console.table(record.rawFields);
            closeModal();
            hideError();
        };

        // 打开模态框，拉取数据
        window.openRecordSelector = async function() {
            hideError();
            const modal = document.getElementById('recordModal');
            modal.style.display = 'block';
            if (allRecords.length === 0) {
                await fetchAllRecords();
            }
            applyFilters();
        };
        function closeModal() { document.getElementById('recordModal').style.display = 'none'; }

        // 从飞书获取所有记录
        async function fetchAllRecords() {
            try {
                if (!window.bitable || !window.bitable.base) throw new Error('飞书SDK未加载');
                const base = window.bitable.base;
                const selection = await base.getSelection();
                let tableId = selection?.tableId;
                if (!tableId) {
                    const activeTable = await base.getActiveTable();
                    tableId = activeTable?.id;
                }
                if (!tableId) throw new Error('无法获取当前表格');
                const table = await base.getActiveTable();
                const recordsData = await table.getRecordList();
                let recordsArray = [];
                if (Array.isArray(recordsData)) recordsArray = recordsData;
                else if (recordsData?.recordList) recordsArray = recordsData.recordList;
                else if (recordsData?.records) recordsArray = recordsData.records;
                if (!recordsArray.length) throw new Error('表格中没有记录');
                allRecords = [];
                for (const rec of recordsArray) {
                    const recordId = rec.recordId || rec.id || rec._id;
                    const fields = rec.fields || rec;
                    if (recordId && fields) {
                        allRecords.push(buildDisplayRecord(recordId, fields));
                    }
                }
                console.log(`成功加载 ${allRecords.length} 条记录`);
            } catch (err) {
                console.error(err);
                showError('获取记录失败：' + err.message);
                allRecords = [];
                renderRecordsTable();
            }
        }

        // 打印
        window.printDocument = function() {
            const customer = document.getElementById('field_customer').innerText;
            if (customer === '' || customer === '—') {
                showError('请先选择一条记录再打印');
                return;
            }
            if (window.bitable?.base?.print) {
                window.bitable.base.print({ fail: () => window.print() });
            } else {
                window.print();
            }
        };

        // 点击模态框外部关闭
        window.onclick = function(event) {
            const modal = document.getElementById('recordModal');
            if (event.target === modal) closeModal();
        };
        window.onload = function() {
            // 初始占位
            document.querySelectorAll('.field-value, .info-value, .stock-value').forEach(el => el.innerText = '—');
            document.getElementById('detailRows').innerHTML = '<tr><td colspan="6" style="text-align:center; color:#999;">请点击「选择单据」加载数据</td></tr>';
        };
    </script>
</body>
</html>
